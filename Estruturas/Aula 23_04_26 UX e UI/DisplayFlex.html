<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box Model</title>
</head>
<body>
    <style>
        .conteiner{
            display: flex;
        }
        .row {
            flex-direction: row;
        }
        .jc-center{
            justify-content: center;
        }
        .grow2{
            flex-grow: 2;
        }
        .fundo1{
            background-color: brown;
        }
        .fundo2{
            background-color: rgb(20, 175, 20);
        }
        .fundo3{
            background-color: rgb(255, 217, 5);
        }
        .fundo4{
            background-color: rgb(20, 175, 162);
        }
        .fundo5{
            background-color: rgb(175, 20, 20);
        }
        .fundo6{
            background-color: rgb(75, 100, 61);
        }
        .fundo7{
            background-color: rgb(175, 113, 20);
        }

        .grow3{
            flex-grow: 3;
        }
        .grow4{
            flex-grow: 4;
        }
        .grow5{
            flex-grow: 5;
        }
        .grow6{
            flex-grow: 6;
        }
        .grow7{
            flex-grow: 7;
        }
        
        
    </style>

    <div class="conteiner row jc-center">
        <div class="grow2 fundo2">
            <p>Conteudo 1</p>
        </div>
        <div class="grow3 fundo3">
            <p>Conteudo 2</p>
        </div>
        <div class="grow4 fundo4">
            <p>Conteudo 3</p>
        </div>
        <div class="grow5 fundo5">
            <p>Conteudo 4</p>
        </div>
        <div class="grow6 fundo6">
            <p>Conteudo 5</p>
        </div>
        <div class="grow7 fundo7">
            <p>Conteudo 6</p>
        </div
    </div>
</body>
</html>
