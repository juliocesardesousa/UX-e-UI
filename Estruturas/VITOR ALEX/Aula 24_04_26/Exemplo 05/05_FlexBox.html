<!DOCTYPE html>
<html>
<head>
  <title>Responsividade com Flexbox</title>
  <link rel="stylesheet" href="05_style_FlexBox.css">
</head>

<body>

  <h1 style="text-align:center;">
    Responsividade com Flexbox
  </h1>

  <!-- ============================= -->
  <!-- CONTAINER -->
  <!-- ============================= -->
  <div class="container">

    <p>
      Este exemplo mostra como o <strong>Flexbox</strong>
      reorganiza os cards conforme a largura da tela:
      empilhando no celular e alinhando em linha em telas maiores.
    </p>

    <!-- ============================= -->
    <!-- FLEX DE CARDS -->
    <!-- ============================= -->
    <div class="flex-cards">

      <div class="card card-1">
        <h3>Card 1</h3>
        <p>Mobile: empilhado</p>
      </div>

      <div class="card card-2">
        <h3>Card 2</h3>
        <p>Flex-direction</p>
      </div>

      <div class="card card-3">
        <h3>Card 3</h3>
        <p>Layout em 1 dimensão</p>
      </div>

      <div class="card card-4">
        <h3>Card 4</h3>
        <p>Responsividade simples</p>
      </div>

    </div>

  </div>

</body>
</html>
