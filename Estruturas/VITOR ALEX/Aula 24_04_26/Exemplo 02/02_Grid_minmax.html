<!DOCTYPE html>
<html>
<head>
  <title>Grid com minmax()</title>
  <link rel="stylesheet" href="02_style_Grid_minmax.css">
</head>

<body>

  <h1 style="text-align:center;">
    Cards Responsivos com minmax()
  </h1>

  <!-- ============================= -->
  <!-- CONTAINER -->
  <!-- ============================= -->
  <div class="container">

    <h2>Grid Responsivo</h2>
    <p>
      Redimensione a janela do navegador para ver
      os cards se redistribuírem automaticamente.
    </p>

    <!-- ============================= -->
    <!-- GRID DE CARDS -->
    <!-- ============================= -->
    <div class="grid-cards">

      <div class="card card-1">
        <h3>Card 1</h3>
        <p>Mínimo de 220px</p>
      </div>

      <div class="card card-2">
        <h3>Card 2</h3>
        <p>Flexível até 1fr</p>
      </div>

      <div class="card card-3">
        <h3>Card 3</h3>
        <p>Auto-fit em ação</p>
      </div>

      <div class="card card-4">
        <h3>Card 4</h3>
        <p>Responsividade real</p>
      </div>

    </div>

  </div>
</body>
</html>
