<!DOCTYPE html>
<html>
<head>
  <title>Media Queries com Cards</title>
  <link rel="stylesheet" href="04_style_Media_Queries.css">
</head>

<body>

  <h1 style="text-align:center;">
    Media Queries – Mudando regras conforme a tela
  </h1>

  <!-- ============================= -->
  <!-- CONTAINER -->
  <!-- ============================= -->
  <div class="container">

    <p>
      Este exemplo mostra como as <strong>media queries</strong>
      alteram o layout de cards conforme a largura da tela
      (celular, tablet e desktop).
    </p>

    <!-- ============================= -->
    <!-- GRID DE CARDS -->
    <!-- ============================= -->
    <div class="cards">

      <div class="card card-1">
        <h3>Card 1</h3>
        <p>Layout base: 1 coluna</p>
      </div>

      <div class="card card-2">
        <h3>Card 2</h3>
        <p>Tablet: 2 colunas</p>
      </div>

      <div class="card card-3">
        <h3>Card 3</h3>
        <p>Desktop: 4 colunas</p>
      </div>

      <div class="card card-4">
        <h3>Card 4</h3>
        <p>Media queries em ação</p>
      </div>

    </div>

  </div>

</body>
</html>
