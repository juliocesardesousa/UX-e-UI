<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Biblioteca</title>
    <link rel="stylesheet" href="Css/MinhaBiblioteca.css">
    <link rel="stylesheet" href="Css/Utilidades.css">
    <link rel="stylesheet" href="Css/cabecalho.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="Css/ProfileNavBars.css">
</head>

<body>

    <!-- cabecalho -->
    <header class="cabecalho">
        <img src="Assets/LogoNova.png" alt="Logo da empresa">
        <ul>
            <li><a href="Index.html"><i class="fa fa-home"></i></a></li>
            <li><a href="#navbar-profile"><i class="fa fa-user-circle-o"></i></a></li>
        </ul>
    </header>
    <!-- Popup -->
    <header id="navbar-profile" class="overlay">
        <div class="popup">
            <a href="Index.html" class="navbar-profile">Home</a>
            <a href="MinhaBiblioteca.html" class="navbar-profile">Perfil</a>
            <a href="#" class="navbar-profile">Ajuda</a>
            <a href="#" class="navbar-profile">Sair</a>
        </div>
    </header>

    <main class="hero">
        <!-- Biblioteca de livros -->
        <h1>Minha Biblioteca</h1>

        <section id="all">
            <div class="card-container">
                <!-- todos os cards -->

                <div class="card">
                    <img src="Assets/CapaLivroRileySager.webp" alt="livro">
                    <div class="card-content">
                        <h3>O Masacre da Família Hope</h3>
                        <p>Riley Sager</p>
                    </div>
                </div>


                <div class="card">
                    <img src="Assets/ItACoisa.jpg" alt="livro">
                    <div class="card-content">
                        <h3>It: A Coisa</h3>
                        <p>Stephen King</p>
                    </div>
                </div>


                <div class="card">
                    <img src="Assets/ACulpaEDasEstrelas.jpg" alt="livro">
                    <div class="card-content">
                        <h3>A Culpa é das Estrelas</h3>
                        <p>John Green</p>
                    </div>
                </div>

                <!-- ... demais livros -->
            </div>
        </section>
    </main>

</body>

</html>
