<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes do livro</title>
    <link rel="stylesheet" href="../Css/DetalheRileySager.css">
    <link rel="stylesheet" href="../Css/Utilidades.css">
    <link rel="stylesheet" href="../Css/cabecalho.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

    <!-- CSS do popup -->
    <style>
        /* Link que abre o popup */
        .btn {
            display: inline-block;
            background: #4CAF50;
            color: white;
            padding: 10px 15px;
            border-radius: 5px;
            text-decoration: none;
            margin: 20px;
        }

        /* Fundo escurecido */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
        }

        /* Caixa do popup */
        .popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 20px;
            border-radius: 8px;
            width: 300px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        /* Mostrar quando o alvo é ativado */
        #mensagem:target {
            display: block;
        }

        /* Botão de fechar */
        .fechar {
            display: inline-block;
            margin-top: 15px;
            padding: 8px 12px;
            background: #f44336;
            color: white;
            border-radius: 5px;
            text-decoration: none;
        }
    </style>
</head>

<body>

    <!-- cabecalho -->
    <header class="cabecalho">
        <img src="Assets/LogoNova.png" alt="Logo da empresa">
        <ul>
            <li><a href="Index.html"><i class="fa fa-home"></i></a></li>
            <li><a href="#mensagem"><i class="fa fa-user-circle-o"></i></a></li>
        </ul>
    </header>

    <main class="hero">

        <p class="tag">Terror</p>
        <h2>O Massacre da Família Hope</h2>
        <img src="Assets/CapaLivroRileySager.webp" alt="Imagem da capa do livro">
        <h2>Descrição do livro</h2>
        <p class="descricao-livro">Lorem ipsum dolor sit amet, consectetur adipisicing elit...</p>

        <!-- Botão que abre o popup -->
        <button><a href="#mensagem" class="btn">Adicionar livro</a></button>
        <button class="voltar-index"><a href="Index.html">Voltar</a></button>

        <!-- Popup -->
        <div id="mensagem" class="overlay">
            <div class="popup">
                ✅ Cadastro realizado com sucesso!
                <br>
                <a href="#" class="fechar">Fechar</a>
            </div>
        </div>

    </main>

</body>
</html>
