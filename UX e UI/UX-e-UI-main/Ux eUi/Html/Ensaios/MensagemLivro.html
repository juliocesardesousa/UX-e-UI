<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Popup com HTML e CSS</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
  }

  /* Link que abre o popup */
  .btn {
    display: inline-block;
    background: #4CAF50;
    color: white;
    padding: 10px 15px;
    border-radius: 5px;
    text-decoration: none;
    margin: 20px;
  }

  /* Fundo escurecido */
  .overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
    display: none;
  }

  /* Caixa do popup */
  .popup {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: white;
    padding: 20px;
    border-radius: 8px;
    width: 300px;
    text-align: center;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
  }

  /* Mostrar quando o alvo é ativado */
  #mensagem:target {
    display: block;
  }

  /* Botão de fechar */
  .fechar {
    display: inline-block;
    margin-top: 15px;
    padding: 8px 12px;
    background: #f44336;
    color: white;
    border-radius: 5px;
    text-decoration: none;
  }
</style>
</head>
<body>

  <!-- Botão para abrir -->
  <a href="#mensagem" class="btn">Clique aqui</a>

  <!-- Popup -->
  <div id="mensagem" class="overlay">
    <div class="popup">
      ✅ Cadastro realizado com sucesso!
      <br>
      <a href="#" class="fechar">Fechar</a>
    </div>
  </div>

</body>
</html>
