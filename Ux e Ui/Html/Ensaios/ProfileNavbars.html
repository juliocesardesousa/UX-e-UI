<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes do livro</title>
    <link rel="stylesheet" href="../Css/DetalheRileySager.css">
    <link rel="stylesheet" href="../Css/Utilidades.css">
    <link rel="stylesheet" href="../Css/cabecalho.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

    <!-- CSS do popup -->
    <style>
        /* Fundo escurecido */
        .overlay {
            display: none;
            position: fixed;
            top: 50px;
            right: 10px;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
        }

        /* Caixa do popup */
        .popup {
            background: black;
            display: block;
            display: flex;
            flex-direction: column;
            margin: 1rem;
        
        }

        .popup a {
            color: white;
            /* Herda a cor do elemento pai */
            text-decoration: none;
            /* Remove o sublinhado */
            padding: 1rem;
            border-bottom: 1px solid #ccc;
        }

        /* Mostrar quando o alvo é ativado */
        #mensagem:target {
            display: block;
        }
    </style>
</head>

<body>

    <!-- cabecalho -->
    <header class="cabecalho">
        <img src="Assets/LogoNova.png" alt="Logo da empresa">
        <ul>
            <li><a href="Index.html"><i class="fa fa-home"></i></a></li>
            <li><a href="#mensagem"><i class="fa fa-user-circle-o"></i></a></li>
        </ul>
    </header>
    <!-- Popup -->
    <header id="mensagem" class="overlay">
        <div class="popup">
            <a href="#" class="navbar-profile">Minha biblioteca</a>
            <a href="#" class="navbar-profile">Perfil</a>
            <a href="#" class="navbar-profile">Favoritos</a>
            <a href="#" class="navbar-profile">Ajuda</a>
            <a href="#" class="navbar-profile">Sair</a>

        </div>
    </header>
    <main class="hero">

        <p class="tag">Terror</p>
        <h2>O Massacre da Família Hope</h2>
        <img src="Assets/CapaLivroRileySager.webp" alt="Imagem da capa do livro">
        <h2>Descrição do livro</h2>
        <p class="descricao-livro">Lorem ipsum dolor sit amet, consectetur adipisicing elit...</p>

        <!-- Botão que abre o popup -->
        <button><a href="#mensagem" class="btn">Adicionar livro</a></button>
        <button class="voltar-index"><a href="Index.html">Voltar</a></button>



    </main>

</body>

</html>
